[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Redirect /api/claude → Netlify function (keeps client code unchanged)
[[redirects]]
  from   = "/api/claude"
  to     = "/.netlify/functions/claude"
  status = 200

# Redirect /api/sheets → Netlify function
[[redirects]]
  from   = "/api/sheets"
  to     = "/.netlify/functions/sheets"
  status = 200

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
